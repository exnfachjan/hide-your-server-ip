name: Build & Publish

# ── Trigger ──────────────────────────────────────────────────────────────────
# Push a tag like "v1.0.1" to start the pipeline automatically.
# Use "Run workflow" in the Actions tab to publish manually.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without v-prefix (e.g. 1.0.1)'
        required: true
        default: '1.0.0'

# ── Secrets needed ───────────────────────────────────────────────────────────
# MODRINTH_ID    — your Modrinth project ID or slug (e.g. "hide-your-server-ip")
# MODRINTH_TOKEN — your Modrinth personal access token (PAT)

jobs:
  build-and-publish:
    name: Build · GitHub Release · Modrinth
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create GitHub Releases

    steps:
      # ── 1. Source ───────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java toolchains (21 for 1.21.x, 25 for 26.x) ────────────────
      - name: Set up JDK 21 & 25
        uses: actions/setup-java@v4
        with:
          java-version: |
            21
            25
          distribution: temurin

      # ── 3. Gradle cache ─────────────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── 4. Version ──────────────────────────────────────────────────────
      - name: Extract version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "v=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "v=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      # ── 5. Build ────────────────────────────────────────────────────────
      - name: Build all JARs
        run: |
          ./gradlew build -x test \
            -Pmod_version=${{ steps.ver.outputs.v }} \
            -Dorg.gradle.java.installations.paths="${JAVA_HOME_21_X64},${JAVA_HOME_25_X64}"

      # ── 6. Collect distributable JARs ───────────────────────────────────
      - name: Collect JARs
        run: |
          mkdir release-jars
          find . -path "*/build/libs/*.jar" \
               ! -name "*sources*" \
               ! -name "*dev*" \
               -exec cp {} release-jars/ \;
          echo "=== Release JARs ==="
          ls -1 release-jars/

      # ── 7. GitHub Release ───────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.ver.outputs.v }}"
          tag_name: ${{ github.ref_name }}
          files: release-jars/*
          generate_release_notes: true
          fail_on_unmatched_files: false

      # ── 8. Modrinth — one version per MC release ─────────────────────────
      # Each step uploads Fabric + NeoForge JAR together as a single
      # Modrinth version.  continue-on-error keeps the pipeline alive when
      # a specific game version is not yet listed on Modrinth.

      - name: "Modrinth › 1.21.1"
        continue-on-error: true
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ secrets.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          name: "HYSI v${{ steps.ver.outputs.v }} for 1.21.1"
          version: ${{ steps.ver.outputs.v }}+mc1.21.1
          version-type: release
          loaders: |
            fabric
            neoforge
          game-versions: 1.21.1
          files: release-jars/*+mc1.21.1.jar

