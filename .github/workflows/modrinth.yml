name: Build & Publish

# ── Trigger ──────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version ohne v-Prefix (z.B. 1.0.1)'
        required: true
        default: '1.0.0'

# ── Secrets needed ───────────────────────────────────────────────────────────
# MODRINTH_ID    — Modrinth Projekt-ID oder Slug
# MODRINTH_TOKEN — Modrinth Personal Access Token

jobs:

  # ══════════════════════════════════════════════════════════════════════════
  # 1) BUILD — kompiliert alle JARs und stellt sie als Artifact bereit
  # ══════════════════════════════════════════════════════════════════════════
  build:
    name: Build all JARs
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.v }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        id: jdk21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Set up JDK 25
        id: jdk25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Extract version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "v=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "v=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: |
          ./gradlew build -x test \
            -Pmod_version=${{ steps.ver.outputs.v }} \
            -Dorg.gradle.java.installations.paths="${{ steps.jdk21.outputs.path }},${{ steps.jdk25.outputs.path }}"

      - name: Collect JARs
        run: |
          mkdir release-jars
          find . -path "*/build/libs/*.jar" \
               ! -name "*sources*" ! -name "*dev*" \
               -exec cp {} release-jars/ \;
          echo "=== Collected JARs ==="
          ls -1 release-jars/

      - uses: actions/upload-artifact@v4
        with:
          name: release-jars
          path: release-jars/
          retention-days: 1

  # ══════════════════════════════════════════════════════════════════════════
  # 2) GITHUB RELEASE — lädt alle JARs als Release-Assets hoch
  # ══════════════════════════════════════════════════════════════════════════
  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-jars
          path: release-jars/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ needs.build.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          files: release-jars/*
          generate_release_notes: true
          fail_on_unmatched_files: false

  # ══════════════════════════════════════════════════════════════════════════
  # 3) MODRINTH — publiziert Fabric und NeoForge getrennt pro MC-Version
  #    Jede Matrix-Kombination = eine eigenständige Modrinth-Version
  # ══════════════════════════════════════════════════════════════════════════
  modrinth:
    name: "Modrinth › ${{ matrix.mc }} (${{ matrix.loader }})"
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true   # Unbekannte MC-Versionen auf Modrinth sind OK
    strategy:
      fail-fast: false
      matrix:
        mc:
          - "1.21.1"
          - "1.21.2"
          - "1.21.3"
          - "1.21.4"
          - "1.21.5"
          - "1.21.6"
          - "1.21.7"
          - "1.21.8"
          - "1.21.9"
          - "1.21.10"
          - "1.21.11"
          - "26.1"
          - "26.1.1"
          - "26.1.2"
        loader: [fabric, neoforge]
        include:
          # 26.x als beta markieren
          - mc: "26.1"
            version-type: beta
          - mc: "26.1.1"
            version-type: beta
          - mc: "26.1.2"
            version-type: beta

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-jars
          path: release-jars/

      # Berechne den exakten Dateinamen im Shell-Step (vermeidet YAML-Faltungsprobleme)
      # Fabric-JAR:   hysi-mc{mc}-{ver}+mc{mc}.jar
      # NeoForge-JAR: hysi-mc{mc}-neoforge-{ver}+mc{mc}.jar
      - name: Resolve JAR path
        id: jar
        env:
          MC: ${{ matrix.mc }}
          LOADER: ${{ matrix.loader }}
          VER: ${{ needs.build.outputs.version }}
        run: |
          if [ "$LOADER" = "neoforge" ]; then
            echo "file=release-jars/hysi-mc${MC}-neoforge-${VER}+mc${MC}.jar" >> $GITHUB_OUTPUT
            echo "label=NeoForge" >> $GITHUB_OUTPUT
          else
            echo "file=release-jars/hysi-mc${MC}-${VER}+mc${MC}.jar" >> $GITHUB_OUTPUT
            echo "label=Fabric" >> $GITHUB_OUTPUT
          fi

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ secrets.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          name: "HYSI v${{ needs.build.outputs.version }} for ${{ matrix.mc }} (${{ steps.jar.outputs.label }})"
          version: ${{ needs.build.outputs.version }}+mc${{ matrix.mc }}-${{ matrix.loader }}
          version-type: ${{ matrix.version-type || 'release' }}
          loaders: ${{ matrix.loader }}
          game-versions: ${{ matrix.mc }}
          files: ${{ steps.jar.outputs.file }}
          additional-files: ""
