name: Publish to CurseForge

# ── Trigger ──────────────────────────────────────────────────────────────────
# Läuft nachdem der Modrinth-Workflow den GitHub Release erstellt hat.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release-Tag (z.B. v1.0.1)'
        required: true

# ── Secrets needed ───────────────────────────────────────────────────────────
# CURSEFORGE_ID    — CurseForge Projekt-ID (numerisch)
# CURSEFORGE_TOKEN — CurseForge API-Key

jobs:

  # ══════════════════════════════════════════════════════════════════════════
  # 1) DOWNLOAD — lädt JARs vom GitHub Release herunter
  # ══════════════════════════════════════════════════════════════════════════
  download:
    name: Download Release JARs
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.v }}
      tag: ${{ steps.ver.outputs.tag }}

    steps:
      - name: Extract version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "v=${TAG#v}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Download Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir release-jars
          gh release download ${{ steps.ver.outputs.tag }} \
            --repo ${{ github.repository }} \
            --pattern "*.jar" \
            --dir release-jars/
          echo "=== Downloaded JARs ==="
          ls -1 release-jars/

      - uses: actions/upload-artifact@v4
        with:
          name: release-jars
          path: release-jars/
          retention-days: 1

  # ══════════════════════════════════════════════════════════════════════════
  # 2) CURSEFORGE — publiziert Fabric und NeoForge getrennt pro MC-Version
  # ══════════════════════════════════════════════════════════════════════════
  curseforge:
    name: "CurseForge › ${{ matrix.mc }} (${{ matrix.loader }})"
    needs: download
    runs-on: ubuntu-latest
    continue-on-error: true   # Unbekannte MC-Versionen auf CurseForge sind OK
    strategy:
      fail-fast: false
      matrix:
        mc:
          - "1.21.1"
          - "1.21.2"
          - "1.21.3"
          - "1.21.4"
          - "1.21.5"
          - "1.21.6"
          - "1.21.7"
          - "1.21.8"
          - "1.21.9"
          - "1.21.10"
          - "1.21.11"
          - "26.1"
          - "26.1.1"
          - "26.1.2"
        loader: [fabric, neoforge]
        include:
          - mc: "26.1"
            version-type: beta
          - mc: "26.1.1"
            version-type: beta
          - mc: "26.1.2"
            version-type: beta

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-jars
          path: release-jars/

      - name: Isolate JAR
        id: jar
        env:
          MC: ${{ matrix.mc }}
          LOADER: ${{ matrix.loader }}
          VER: ${{ needs.download.outputs.version }}
        run: |
          mkdir single-jar
          if [ "$LOADER" = "neoforge" ]; then
            cp "release-jars/hysi-mc${MC}-neoforge-${VER}+mc${MC}.jar" single-jar/
            echo "label=NeoForge" >> $GITHUB_OUTPUT
          else
            cp "release-jars/hysi-mc${MC}-${VER}+mc${MC}.jar" single-jar/
            echo "label=Fabric" >> $GITHUB_OUTPUT
          fi
          echo "file=$(ls single-jar/*.jar)" >> $GITHUB_OUTPUT

      - name: Publish to CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: ${{ secrets.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          name: "HYSI v${{ needs.download.outputs.version }} for ${{ matrix.mc }} [${{ steps.jar.outputs.label }}]"
          version: ${{ needs.download.outputs.version }}+mc${{ matrix.mc }}-${{ matrix.loader }}
          version-type: ${{ matrix.version-type || 'release' }}
          loaders: ${{ matrix.loader }}
          game-versions: ${{ matrix.mc }}
          files: ${{ steps.jar.outputs.file }}
