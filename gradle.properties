neo_1_21_5=21.5.0-beta
fabric_api_1_21_5=0.127.0+1.21.5

# ── 26.1+ ───────────────────────────────────────────────
# Minecraft 26.1 introduces: new version numbering, Java 25, no obfuscation,
# no Yarn/Intermediary.  NeoForge uses four-component versions: 26.1.0.<n>.
# Loom 1.15+ is required for the no-remap Fabric workflow.
mc_26_1=26.1
neo_26_1=26.1.0.1-beta
fabric_api_26_1=0.144.0+26.1

