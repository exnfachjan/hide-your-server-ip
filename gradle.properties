# ── 1.21.5–1.21.11 ──────────────────────────────────────
# One JAR covers 1.21.5 through 1.21.11 (all still Java 21, same toolchain)
# NeoForge 21.5–21.11 follow the 21.x.y pattern; we build against 1.21.5 as
# the minimum and declare a broad [21.5,21.12) version range in the metadata.
# Update neo_1_21_5 to a higher 21.x.y build when a later minor is released.
