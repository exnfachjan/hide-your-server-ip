modLoader = "javafml"
loaderVersion = "[2,)"
license = "ARR"

[[mods]]
modId = "hysi"
version = "${version}"
displayName = "Hide Your Server IP"
description = '''
Hides server IP addresses behind a password-style mask in the multiplayer menus.
Click [*] next to the address field to reveal the IP.
Designed to prevent accidental IP leaks during streams.
'''
authors = "exnfachjan"

[[dependencies.hysi]]
modId = "neoforge"
type = "required"
# Covers NeoForge 21.5.x through 21.11.x (all 1.21.5–1.21.11 builds)
versionRange = "[21.5,21.12)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.hysi]]
modId = "minecraft"
type = "required"
versionRange = "[1.21.5,1.21.12)"
ordering = "NONE"
side = "CLIENT"

[[mixins]]
config = "hysi.mixins.json"
