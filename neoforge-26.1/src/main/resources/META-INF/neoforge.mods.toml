modLoader = "javafml"
loaderVersion = "[2,)"
license = "ARR"

[[mods]]
modId = "hysi"
version = "${version}"
displayName = "Hide Your Server IP"
description = '''
Hides server IP addresses behind a password-style mask in the multiplayer menus.
Click [*] next to the address field to reveal the IP.
Designed to prevent accidental IP leaks during streams.
'''
authors = "exnfachjan"

[[dependencies.hysi]]
modId = "neoforge"
type = "required"
# NeoForge 26.1.x.y — covers all 26.1 hotfixes
versionRange = "[26.1,26.2)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.hysi]]
modId = "minecraft"
type = "required"
# Minecraft 26.1 and all hotfixes (26.1.1, 26.1.2, …)
versionRange = "[26.1,26.2)"
ordering = "NONE"
side = "CLIENT"

[[mixins]]
config = "hysi.mixins.json"
